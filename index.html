<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>4 Seed Registration</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#eef8ef;
padding:20px;
}

.container{
max-width:420px;
margin:auto;
background:#fff;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.logo{
text-align:center;
font-size:32px;
font-weight:bold;
color:#0b7a3d;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#666;
margin-bottom:25px;
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

input{
width:100%;
padding:12px;
margin-top:5px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

input[readonly]{
background:#f2f2f2;
}

#status{
margin-top:8px;
font-size:14px;
font-weight:bold;
}

button{
width:100%;
margin-top:25px;
padding:14px;
background:#0b7a3d;
color:#fff;
border:none;
border-radius:8px;
font-size:17px;
cursor:pointer;
}

button:disabled{
background:#999;
cursor:not-allowed;
}

.success{
display:none;
text-align:center;
}

.success h2{
color:green;
margin-bottom:15px;
}

.success p{
margin:8px 0;
font-size:16px;
}

.partner-box{
margin-top:20px;
padding:15px;
background:#eef8ef;
border-radius:10px;
border:1px solid #0b7a3d;
}

.partner-box h3{
color:#0b7a3d;
margin-bottom:10px;
}

.partner-box p{
margin:6px 0;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<div id="formPage">

<div class="logo">
🌱 4 Seed
</div>

<div class="subtitle">
Partner Registration
</div>

<form id="registrationForm">

<label>Sponsor ID</label>

<input
type="text"
id="sponsorId"
placeholder="Enter Sponsor ID"
autocomplete="off">

<label>Sponsor Name</label>

<input
type="text"
id="sponsorName"
readonly
placeholder="Auto Verified">

<div id="status"></div>

<label>Full Name</label>

<input
type="text"
id="fullName"
placeholder="Enter Full Name">

<label>Mobile Number</label>

<input
type="tel"
id="mobile"
placeholder="Enter Mobile Number">

<label>Place</label>

<input
type="text"
id="place"
placeholder="Enter Place">

<button
type="submit"
id="submitBtn">
Submit Registration
</button>

</form>

</div>

<div
id="successPage"
class="success">

<h2>
✅ Registration Successful
</h2>

<div class="partner-box">

<h3>Partner Details</h3>

<p>
Partner ID :
<span id="partnerIdText"></span>
</p>

<p>
Sponsor :
<span id="sponsorNameText"></span>
</p>

<p>
Name :
<span id="partnerNameText"></span>
</p>

</div>

<br>

<button onclick="location.reload()">

Register Another Partner

</button>

</div>

</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwhub93htUz8GehM7tbfugo0YejhohT2j-Dx3M7mOn6aqzvuq8YBc2OOdD_wmJCyGRe/exec";

const sponsorId = document.getElementById("sponsorId");
const sponsorName = document.getElementById("sponsorName");
const status = document.getElementById("status");
const submitBtn = document.getElementById("submitBtn");

// Sponsor Verification
sponsorId.addEventListener("change", async () => {

    const id = sponsorId.value.trim();

    sponsorName.value = "";
    status.innerHTML = "";
    submitBtn.disabled = true;

    if (id.length < 6) {
        return;
    }

    try {

        const url =
            WEB_APP_URL +
            "?action=verifySponsor&sponsorId=" +
            encodeURIComponent(id) +
            "&t=" + Date.now();

        const res = await fetch(url);
        const result = await res.json();

        if (result.status) {

            sponsorName.value = result.sponsorName;
            status.innerHTML = "✅ Sponsor Verified";
            status.style.color = "green";
            submitBtn.disabled = false;

        } else {

            sponsorName.value = "";
            status.innerHTML = "❌ Invalid Sponsor ID";
            status.style.color = "red";

        }

    } catch (err) {

        console.log(err);

        status.innerHTML = "❌ Unable to verify Sponsor";
        status.style.color = "red";

    }

});


// Registration Submit

document.getElementById("registrationForm").addEventListener("submit",async function(e){

e.preventDefault();

if(
sponsorId.value==="" ||
sponsorName.value==="" ||
fullName.value==="" ||
mobile.value==="" ||
place.value===""){
alert("Please fill all details.");
return;
}

submitBtn.disabled=true;

try{

const response = await fetch(WEB_APP_URL,{
    method:"POST",
    mode:"cors",
    headers:{
        "Content-Type":"text/plain;charset=utf-8"
    },
    body:JSON.stringify({
        sponsorId:sponsorId.value,
        sponsorName:sponsorName.value,
        fullName:fullName.value,
        mobile:mobile.value,
        place:place.value
    })
});
    
const result=await response.json();

if(result.success){

document.getElementById("partnerIdText").innerHTML=result.partnerId;

document.getElementById("partnerNameText").innerHTML=fullName.value;

document.getElementById("sponsorNameText").innerHTML=sponsorName.value;

document.getElementById("formPage").style.display="none";

document.getElementById("successPage").style.display="block";

}else{

alert(result.message || result.error);

submitBtn.disabled=false;

}

}catch(err){

    alert(err.toString());

    status.innerHTML = "❌ Registration Failed";
    status.style.color = "red";

    submitBtn.disabled = false;

}

});
</script>

</body>
</html>
